# Global OMP defaults managed by claude-config.
# Model role values use OMP's provider/model:thinking syntax.
modelRoleStorage: global
modelRoles:
  default: openai/gpt-5.6-terra:xhigh
  plan: openai/gpt-5.6-terra:xhigh
  smol: openai/gpt-5.6-luna:high
  task: "@smol"
  slow: openai/gpt-5.6-sol:high
  tiny: openai/gpt-5.6-luna:low
advisor:
  enabled: false
task:
  maxConcurrency: 10
  maxRecursionDepth: 1
glob:
  enabled: true
grep:
  enabled: true
astGrep:
  enabled: true
tools:
  xdev: true
  xdevDocs: builtins
